<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Agent Picker</title>
    <style>
        /* Minimalist Dark Theme */
        body {
            background-color: #1c1c1e; /* Space Gray-ish background */
            color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: #ff4655; /* Valorant Red accent */
        }
        .btn-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            background-color: #2c2c2e;
            color: white;
            border: 1px solid #3a3a3c;
            padding: 15px 30px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover {
            background-color: #ff4655;
            border-color: #ff4655;
            transform: translateY(-2px);
        }
        #result-container {
            margin-top: 50px;
            height: 60px;
        }
        #agent-name {
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>AGENT PICKER</h1>
    
    <div class="btn-container">
        <button onclick="pickAgent('duelist')">Duelist</button>
        <button onclick="pickAgent('initiator')">Initiator</button>
        <button onclick="pickAgent('sentinel')">Sentinel</button>
        <button onclick="pickAgent('controller')">Controller</button>
    </div>

    <div id="result-container">
        <div id="agent-name"></div>
    </div>

    <script>
        // Your Java arrays translated into JavaScript arrays
        const agents = {
            duelist: ["Phoenix", "Reyna", "Jett", "Raze", "Yoru", "Neon", "Iso", "Waylay"],
            initiator: ["Sova", "Breach", "Skye", "KAY/O", "Fade", "Gekko", "Tejo"],
            sentinel: ["Sage", "Cypher", "Killjoy", "Chamber", "Deadlock", "Vyse", "Veto"],
            controller: ["Brimstone", "Viper", "Omen", "Astra", "Harbor", "Clove", "Miks"]
        };

        function pickAgent(role) {
            // Get the correct array based on the button clicked
            const selectedArray = agents[role];
            
            // Randomly select an agent (JS equivalent of random.nextInt)
            const randomIndex = Math.floor(Math.random() * selectedArray.length);
            const pickedAgent = selectedArray[randomIndex];
            
            // Display the result on the webpage
            document.getElementById('agent-name').innerText = pickedAgent;
        }
    </script>
</body>
</html>
